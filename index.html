<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>A Little Surprise</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<div class="floating-container"></div>

<script>

const container = document.querySelector(".floating-container");

const items = ["❤️","🌹","🍫"];

function createItem(){

const el = document.createElement("div");

el.classList.add("floating-item");

el.innerHTML = items[Math.floor(Math.random()*items.length)];

const startSide = Math.floor(Math.random()*4);

let x = 0;
let y = 0;

if(startSide === 0){ // bottom
x = Math.random()*100;
y = 110;
}
if(startSide === 1){ // top
x = Math.random()*100;
y = -10;
}
if(startSide === 2){ // left
x = -10;
y = Math.random()*100;
}
if(startSide === 3){ // right
x = 110;
y = Math.random()*100;
}

el.style.left = x + "vw";
el.style.top = y + "vh";

container.appendChild(el);

setTimeout(()=>{

el.remove();

},8000);

}

setInterval(createItem,400);

</script>

<h1>Hello Sweetu ✨</h1>

<p class="intro">
I made a small little thing for you.<br>
It's nothing big...<br>
but I hope it makes you smile.
</p>

<a href="poem.html">
<button class="startBtn">Open Your Surprise 🌹</button>
</a>

</div>

</body>

</html>
