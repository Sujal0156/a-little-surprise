<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>For Sweetu</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="background"></div>

<div class="hearts"></div>

<canvas id="sparkles"></canvas>

<div class="container">

<h1 class="title">Hey Sweetu 💖</h1>

<p class="message">
I made something small for you.<br>
It's nothing big...<br>
but I hope it makes you smile today 😊
</p>

<div class="envelope" onclick="openLetter()">
💌
<p>Tap to open your surprise</p>
</div>

</div>

<script>

// MUSIC START
document.body.addEventListener("click",()=>{
document.getElementById("music").play();
},{once:true});

// HEART GENERATOR
const itemsContainer = document.querySelector(".hearts");

const items = ["❤️","💖","💕","🌹","🍫"];

for(let i=0;i<45;i++){

let item=document.createElement("span");

item.innerHTML = items[Math.floor(Math.random()*items.length)];

item.style.left = Math.random()*100 + "%";
item.style.animationDuration = (6 + Math.random()*10) + "s";
item.style.fontSize = (18 + Math.random()*30) + "px";
item.style.animationDelay = Math.random()*5 + "s";

itemsContainer.appendChild(item);

}

// HEART EXPLOSION
function openLetter(){

for(let i=0;i<15;i++){

let heart=document.createElement("div");
heart.innerHTML="💖";
heart.className="explode";

heart.style.left="50%";
heart.style.top="60%";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),1000);

}

setTimeout(()=>{
window.location.href="surprise.html";
},700);

}


// SPARKLES FOLLOW MOUSE
const canvas = document.getElementById("sparkles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles=[];

document.addEventListener("mousemove",(e)=>{

particles.push({
x:e.clientX,
y:e.clientY,
size:3,
life:60
});

});

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{

ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

p.life--;
p.size*=0.96;

if(p.life<=0) particles.splice(i,1);

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>

</html>
